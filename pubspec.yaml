name: myndex
description: Personal content management app - movies, series, games, books.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  drift: '>=2.18.0 <2.19.0'
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.20

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3

  # JSON serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  shared_preferences: ^2.2.3

  # UUID
  uuid: ^4.4.0

  # File handling
  path_provider: ^2.1.3
  file_picker: ^8.0.0+1
  share_plus: ^9.0.0

  # Image caching
  cached_network_image: ^3.3.1

  # UI
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0

  # Fonts (Google Fonts fallback si no hay assets)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  # Tests: necesitamos `package:sqlite3/open.dart` para registrar la DLL
  # nativa antes de que Drift haga `NativeDatabase.memory()`.
  sqlite3: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
