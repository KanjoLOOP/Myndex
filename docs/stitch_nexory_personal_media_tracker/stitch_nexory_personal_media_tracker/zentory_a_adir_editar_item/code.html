<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zentory - Add / Edit Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Work+Sans:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#283593",
                        "surface-container-low": "#1c1b1b",
                        "surface-dim": "#131313",
                        "surface": "#131313",
                        "primary": "#bcc2ff",
                        "secondary": "#a2d3a4",
                        "on-primary-fixed-variant": "#303c9a",
                        "background": "#131313",
                        "on-primary-fixed": "#000c62",
                        "secondary-fixed-dim": "#a2d3a4",
                        "on-background": "#e5e2e1",
                        "on-primary-container": "#9aa5ff",
                        "tertiary-fixed": "#ffdbd0",
                        "on-tertiary-fixed-variant": "#713623",
                        "surface-bright": "#393939",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#24502c",
                        "tertiary-container": "#682f1d",
                        "surface-container": "#201f1f",
                        "primary-fixed-dim": "#bcc2ff",
                        "on-surface-variant": "#c6c5d4",
                        "tertiary": "#ffb59e",
                        "tertiary-fixed-dim": "#ffb59e",
                        "on-tertiary": "#54200f",
                        "error": "#ffb4ab",
                        "outline": "#908f9d",
                        "on-secondary-fixed": "#002109",
                        "on-tertiary-fixed": "#390c01",
                        "surface-tint": "#bcc2ff",
                        "on-tertiary-container": "#e8977e",
                        "error-container": "#93000a",
                        "on-secondary-container": "#91c193",
                        "surface-container-highest": "#353534",
                        "secondary-fixed": "#bdefbe",
                        "on-secondary": "#0a3817",
                        "inverse-primary": "#4955b3",
                        "on-primary": "#152383",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "inverse-surface": "#e5e2e1",
                        "outline-variant": "#454652",
                        "on-surface": "#e5e2e1",
                        "on-error": "#690005",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#dfe0ff",
                        "secondary-container": "#24502c",
                        "inverse-on-surface": "#313030"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "gutter": "16px",
                        "margin-desktop": "24px",
                        "margin-mobile": "16px",
                        "container-padding": "28px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-md": ["Work Sans"],
                        "title-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "title-lg": ["22px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "display-lg": ["57px", { "lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        /* Hide scrollbar for clean look but allow scrolling */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container pb-24">
<!-- TopAppBar Semantic Shell Suppressed for Transactional Intent (Add/Edit) -->
<header class="sticky top-0 z-40 bg-surface-container-low flex justify-between items-center w-full px-6 py-4 shadow-[0_4px_20px_0_rgba(0,0,0,0.1)]">
<button class="text-on-surface hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full hover:bg-surface-container-highest">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Add New Content</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<main class="flex-grow w-full max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-8 flex flex-col gap-8">
<!-- Content Type Selector -->
<section class="flex flex-col gap-4">
<h2 class="font-label-md text-label-md text-outline">CONTENT TYPE</h2>
<div class="flex flex-wrap gap-3">
<button class="bg-primary-container text-on-primary-container px-6 py-3 rounded-full font-label-md text-label-md flex items-center gap-2 border border-transparent shadow-[0_4px_12px_0_rgba(0,0,0,0.2)]">
<span class="material-symbols-outlined text-[18px]">movie</span>
                    Movie
                </button>
<button class="bg-surface-container text-on-surface px-6 py-3 rounded-full font-label-md text-label-md flex items-center gap-2 border border-outline-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">tv</span>
                    Series
                </button>
<button class="bg-surface-container text-on-surface px-6 py-3 rounded-full font-label-md text-label-md flex items-center gap-2 border border-outline-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">book</span>
                    Book
                </button>
<button class="bg-surface-container text-on-surface px-6 py-3 rounded-full font-label-md text-label-md flex items-center gap-2 border border-outline-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">sports_esports</span>
                    Game
                </button>
</div>
</section>
<!-- Search Field -->
<section class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full bg-surface-container-high text-on-surface font-body-lg text-body-lg pl-12 pr-4 py-4 rounded-DEFAULT border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all placeholder:text-outline-variant shadow-[0_2px_8px_0_rgba(0,0,0,0.1)]" placeholder="Search for title..." type="text"/>
</section>
<div class="h-px w-full bg-surface-variant my-2"></div>
<!-- Manual Entry Fields -->
<section class="flex flex-col gap-6">
<h2 class="font-label-md text-label-md text-outline">MANUAL ENTRY</h2>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="title">Title</label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant rounded-t-DEFAULT focus:border-primary focus:ring-0 px-4 py-3 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant transition-colors" id="title" placeholder="Enter full title" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="genre">Genre</label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant rounded-t-DEFAULT focus:border-primary focus:ring-0 px-4 py-3 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant transition-colors" id="genre" placeholder="e.g., Sci-Fi, Thriller" type="text"/>
</div>
<div class="flex flex-col gap-2 relative">
<label class="font-label-md text-label-md text-on-surface-variant" for="status">Status</label>
<select class="w-full bg-surface-container-low border-b-2 border-outline-variant rounded-t-DEFAULT focus:border-primary focus:ring-0 px-4 py-3 font-body-lg text-body-lg text-on-surface appearance-none transition-colors" id="status">
<option value="planning">Planning to Watch</option>
<option value="watching">Currently Watching</option>
<option value="completed">Completed</option>
<option value="dropped">Dropped</option>
</select>
<div class="absolute inset-y-0 right-0 top-6 pr-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">arrow_drop_down</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="rating">Rating</label>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline hover:text-primary cursor-pointer transition-colors text-[32px]">star</span>
<span class="material-symbols-outlined text-outline hover:text-primary cursor-pointer transition-colors text-[32px]">star</span>
<span class="material-symbols-outlined text-outline hover:text-primary cursor-pointer transition-colors text-[32px]">star</span>
<span class="material-symbols-outlined text-outline hover:text-primary cursor-pointer transition-colors text-[32px]">star</span>
<span class="material-symbols-outlined text-outline hover:text-primary cursor-pointer transition-colors text-[32px]">star</span>
</div>
</div>
</section>
<!-- Notes Field -->
<section class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="notes">Personal Notes</label>
<textarea class="w-full bg-surface-container-low border-b-2 border-outline-variant rounded-t-DEFAULT focus:border-primary focus:ring-0 px-4 py-3 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant transition-colors resize-none" id="notes" placeholder="Add your thoughts, review, or quotes here..." rows="4"></textarea>
</section>
</main>
<!-- Fixed Action Button -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-background via-background/90 to-transparent z-50">
<button class="w-full max-w-3xl mx-auto block bg-primary text-on-primary font-title-lg text-title-lg py-4 rounded-full shadow-[0_4px_12px_0_rgba(188,194,255,0.2)] hover:opacity-90 transition-opacity active:scale-[0.98]">
            Save Content
        </button>
</div>
</body></html>
